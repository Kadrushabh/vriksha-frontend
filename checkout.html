  <!-- Pre-paint auth check: runs before body renders so banners are correct on first frame -->

  try {
    var _vu = JSON.parse(localStorage.getItem('vriksha_user') || 'null');
    document.documentElement.classList.add((_vu && (_vu._id || _vu.phone)) ? 'vk-logged-in' : 'vk-guest');
  } catch(e) { document.documentElement.classList.add('vk-guest'); }
  </script>
